<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Restaurant</title>
</head>

<body>
    <header>
        <nav class="nav-container">
            <div class="logo">
                <img src="./img/.png" alt="logo">
            </div>
            <div class="navigation">
                <a class="navi" href="#">Home</a>
                <a class="navi" href="#">About</a>
                <a class="navi" href="#">Menu</a>
                <a class="navi" href="#">Contact</a>
            </div>
        </nav>
        <div class="section-hero">
            <div class="hero-content">
                <div class="container-slogan">
                    <p class="slogan">HandMade With Love in Rome</p>
                </div>
                <div class="container-title">
                    <h1 class="hero-title">L'Arte della Tradizione</h1>
                </div>
                <div class="container-description">
                    <p class="hero-description">Experience the soul of Italian craftsmanship through recipes
                        passed down for generations. Every strand of pasta, every
                        secret in the sauce.</p>
                </div>
            </div>
            <div class="video">
                <video src="./video/hero.mp4" autoplay muted loop></video>
                <p class="video-title">Watch the Video</p>
            </div>
        </div>

    </header>

    <main>
        <section>

        </section>
    </main>

</html>
