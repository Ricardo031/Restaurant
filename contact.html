<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

<section id="grids">
    <div class="info" id="mostrar">
        <h2>Contáctanos</h2>
        <form>
            <label>Nombre</label>
            <div class="campo">
                <input class="highlight" type="nombre" id="nombre" name="nombre"/>
            </div>

            <label>Correo</label>
            <div class="campo">
                    <input class="highlight" type="correo" id="correo" name="correo" placeholder="ej: usuario123@gmail.com"/>
            </div>
            
            <label>Teléfono</label>
            <div class="campo">
                <input class="highlight" type="teléfono" id="teléfono" name="teléfono" placeholder="XXXXXXXXXX"/>
            </div>

            <label>Mensaje</label>
            <div class="campo">
                <textarea class="highlight" id="mensaje" name="mensaje" placeholder="Deja tu mensaje"></textarea>
            </div>
            <button class="highlight">Enviar</button>
        </form>
    </div>
    <div class="info" id="llamanos">
        <h2>Llámanos</h2>
            
        <div class="otro">
            <img class="iconos" src="./img/instagram.webp" alt="">
            <span>lavidpizza</span>
        </div>

        <div class="otro">
            <img class="iconos" src="./img/telefono.webp" alt="">
            <span>Teléfono: 3187630851</span>
        </div>
        
        <div class="otro">
            <img class="iconos" src="./img/email.webp" alt="">
            <span>Correo: lavid@gmail.com</span>
        </div>
        
        <h2>Dirección</h2>
        <div class="otro">
            <img class="iconos" src="./img/gps.webp" alt="">
            <span>Cra. 46 # 85-15, C.C. Garden Mall</span>
        </div>
    </div>

    <div class="info">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3916.485812705048!2d-74.82386072407054!3d11.002130254988188!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8ef42da7066a9f45%3A0x54d4f06b7200ba25!2sLa%20Vid%20Pizza!5e0!3m2!1ses-419!2sco!4v1776781037275!5m2!1ses-419!2sco" width="500" height="500" style="border:0;  align-self: center; margin-right: 3rem;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
</section>
</body>
</html>
